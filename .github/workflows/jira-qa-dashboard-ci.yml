name: Jira QA dashboard CI

on:
  push:
    branches: [main, master]
    paths:
      - "jira-qa-test-dashboard/**"
      - ".github/workflows/jira-qa-dashboard-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "jira-qa-test-dashboard/**"
      - ".github/workflows/jira-qa-dashboard-ci.yml"

defaults:
  run:
    working-directory: jira-qa-test-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: jira-qa-test-dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
