# Jira QA dashboard on Render — native Node (free tier).
# Free tier does NOT support preDeployCommand; Playwright installs in buildCommand.

services:
  - type: web
    name: qatestcases
    runtime: node
    plan: free
    rootDir: jira-qa-test-dashboard
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npx playwright install chromium && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: JIRA_HOST
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
    buildFilter:
      paths:
        - jira-qa-test-dashboard/**
