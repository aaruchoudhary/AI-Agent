# Monorepo: Jira QA dashboard on Render (Docker).
# Docker paths are relative to the Git repository root (Render requirement).
#
# Public URL uses the service `name`, e.g. https://qatestcases.onrender.com

services:
  - type: web
    name: qatestcases
    runtime: docker
    dockerfilePath: ./jira-qa-test-dashboard/Dockerfile
    dockerContext: ./jira-qa-test-dashboard
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Do NOT set PORT — Render injects it; the app listens on process.env.PORT
      - key: TRUST_PROXY
        value: "1"
      - key: JIRA_HOST
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
    buildFilter:
      paths:
        - jira-qa-test-dashboard/**
