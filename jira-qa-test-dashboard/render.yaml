# Standalone repo root — same pattern as monorepo root render.yaml.

services:
  - type: web
    name: qatestcases
    runtime: node
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    preDeployCommand: npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: JIRA_HOST
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
